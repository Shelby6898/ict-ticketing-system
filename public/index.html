<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICT Ticketing System</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2e3148;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --green: #00e5a0;
      --yellow: #ffd166;
      --red: #ff6b6b;
      --text: #e8e9f3;
      --muted: #6b6f8a;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .topbar-logo span { color: var(--text); }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .badge-role {
      background: var(--accent);
      color: white;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .badge-role.admin { background: var(--accent2); }

    #auth {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse at 60% 20%, #1e1a3a 0%, var(--bg) 60%);
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }

    .auth-title {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .auth-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.2s;
    }

    .tab.active { background: var(--accent); color: white; }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group select option { background: var(--surface); }
    .form-group textarea { resize: vertical; min-height: 90px; }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #5a52e0; transform: translateY(-1px); }

    .btn-sm {
      width: auto;
      padding: 6px 14px;
      font-size: 12px;
      border-radius: 8px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-danger { background: rgba(255,107,107,0.15); color: var(--red); }
    .btn-danger:hover { background: rgba(255,107,107,0.3); }

    .btn-logout {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .btn-logout:hover { color: var(--text); border-color: var(--accent); }

    #app { display: none; }

    .app-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .panel-body { padding: 24px; }

    .tickets-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; }

    .filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(108,99,255,0.1);
    }

    #ticketsList { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .ticket-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: border-color 0.2s;
    }

    .ticket-card:hover { border-color: var(--accent); }

    .ticket-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .ticket-title { font-weight: 600; font-size: 14px; color: var(--text); }

    .ticket-desc {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .ticket-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-open { background: rgba(108,99,255,0.15); color: var(--accent); }
    .badge-progress { background: rgba(255,209,102,0.15); color: var(--yellow); }
    .badge-resolved { background: rgba(0,229,160,0.15); color: var(--green); }
    .badge-low { background: rgba(0,229,160,0.1); color: var(--green); }
    .badge-medium { background: rgba(255,209,102,0.1); color: var(--yellow); }
    .badge-high { background: rgba(255,107,107,0.1); color: var(--red); }

    .ticket-actions { display: flex; gap: 6px; align-items: center; }

    .status-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      outline: none;
    }

    .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .alert-success { background: rgba(0,229,160,0.1); color: var(--green); border: 1px solid rgba(0,229,160,0.2); }
    .alert-error { background: rgba(255,107,107,0.1); color: var(--red); border: 1px solid rgba(255,107,107,0.2); }

    .count-badge {
      background: var(--accent);
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .app-body { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="auth">
  <div class="auth-card">
    <div class="auth-title">ICT//TICKETS</div>
    <div class="auth-subtitle">Internal support ticketing system</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', this)">Login</button>
      <button class="tab" onclick="switchTab('register', this)">Register</button>
    </div>
    <div id="authAlert" class="alert"></div>
    <div id="loginForm">
      <div class="form-group"><label>Email</label><input id="loginEmail" type="email" placeholder="you@example.com"></div>
      <div class="form-group"><label>Password</label><input id="loginPassword" type="password" placeholder="••••••••"></div>
      <button class="btn btn-primary" onclick="login()">Login</button>
    </div>
    <div id="registerForm" style="display:none;">
      <div class="form-group"><label>Email</label><input id="regEmail" type="email" placeholder="you@example.com"></div>
      <div class="form-group"><label>Password</label><input id="regPassword" type="password" placeholder="••••••••"></div>
      <button class="btn btn-primary" onclick="register()">Create Account</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">ICT//<span>TICKETS</span></div>
    <div class="topbar-user">
      <span id="topbarEmail"></span>
      <span id="topbarRole" class="badge-role"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="app-body">
    <div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">NEW TICKET</span></div>
        <div class="panel-body">
          <div id="ticketAlert" class="alert"></div>
          <div class="form-group"><label>Title</label><input id="ticketTitle" placeholder="Brief description of the issue"></div>
          <div class="form-group"><label>Description</label><textarea id="ticketDesc" placeholder="Provide more details..."></textarea></div>
          <div class="form-group">
            <label>Priority</label>
            <select id="ticketPriority">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="submitTicket()">Submit Ticket</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="tickets-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="panel-title">TICKETS</span>
          <span class="count-badge" id="ticketCount">0</span>
        </div>
        <div class="filters">
          <button class="filter-btn active" onclick="filterTickets('all', this)">All</button>
          <button class="filter-btn" onclick="filterTickets('open', this)">Open</button>
          <button class="filter-btn" onclick="filterTickets('in-progress', this)">In Progress</button>
          <button class="filter-btn" onclick="filterTickets('resolved', this)">Resolved</button>
        </div>
      </div>
      <div id="ticketsList"></div>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let allTickets = [];
let currentFilter = 'all';

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('authAlert').style.display = 'none';
}

function showAlert(id, message, type) {
  const el = document.getElementById(id);
  el.className = `alert alert-${type}`;
  el.textContent = message;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function register() {
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  if (!email || !password) return showAlert('authAlert', 'Please fill in all fields', 'error');
  fetch('http://localhost:5000/register', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  }).then(r => r.json()).then(data => {
    if (data.error) return showAlert('authAlert', data.error, 'error');
    showAlert('authAlert', 'Account created! You can now login.', 'success');
  }).catch(() => showAlert('authAlert', 'Server error. Is the server running?', 'error'));
}

function login() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return showAlert('authAlert', 'Please fill in all fields', 'error');
  fetch('http://localhost:5000/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  }).then(r => r.json()).then(data => {
    if (data.error) return showAlert('authAlert', data.error, 'error');
    currentUser = data.user;
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('topbarEmail').textContent = currentUser.email;
    const roleEl = document.getElementById('topbarRole');
    roleEl.textContent = currentUser.role || 'user';
    if (currentUser.role === 'admin') roleEl.classList.add('admin');
    loadTickets();
  }).catch(() => showAlert('authAlert', 'Server error. Is the server running?', 'error'));
}

function logout() {
  currentUser = null; allTickets = [];
  document.getElementById('auth').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function submitTicket() {
  const title = document.getElementById('ticketTitle').value;
  const description = document.getElementById('ticketDesc').value;
  const priority = document.getElementById('ticketPriority').value;
  if (!title || !description) return showAlert('ticketAlert', 'Please fill in all fields', 'error');
  fetch('http://localhost:5000/tickets', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, description, priority, userId: currentUser.id, userEmail: currentUser.email })
  }).then(r => r.json()).then(data => {
    if (data.error) return showAlert('ticketAlert', data.error, 'error');
    showAlert('ticketAlert', 'Ticket submitted!', 'success');
    document.getElementById('ticketTitle').value = '';
    document.getElementById('ticketDesc').value = '';
    loadTickets();
  });
}

function loadTickets() {
  const url = currentUser.role === 'admin'
    ? 'http://localhost:5000/tickets'
    : `http://localhost:5000/tickets?userId=${currentUser.id}`;
  fetch(url).then(r => r.json()).then(data => { allTickets = data; renderTickets(); });
}

function filterTickets(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTickets();
}

function renderTickets() {
  const list = document.getElementById('ticketsList');
  const tickets = currentFilter === 'all' ? allTickets : allTickets.filter(t => t.status === currentFilter);
  document.getElementById('ticketCount').textContent = tickets.length;
  if (tickets.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><p>No tickets found</p></div>`;
    return;
  }
  list.innerHTML = tickets.map(t => `
    <div class="ticket-card">
      <div class="ticket-top">
        <div class="ticket-title">${t.title}</div>
        <button class="btn-sm btn-danger" onclick="deleteTicket('${t.id}')">Delete</button>
      </div>
      <div class="ticket-desc">${t.description}</div>
      <div class="ticket-meta">
        <span class="badge ${statusBadge(t.status)}">${t.status || 'open'}</span>
        <span class="badge ${priorityBadge(t.priority)}">${t.priority || 'medium'}</span>
        ${currentUser.role === 'admin' ? `<span style="font-size:11px;color:var(--muted)">👤 ${t.userEmail || ''}</span>` : ''}
        <select class="status-select" onchange="updateStatus('${t.id}', this.value)">
          <option value="open" ${t.status==='open'?'selected':''}>Open</option>
          <option value="in-progress" ${t.status==='in-progress'?'selected':''}>In Progress</option>
          <option value="resolved" ${t.status==='resolved'?'selected':''}>Resolved</option>
        </select>
      </div>
    </div>
  `).join('');
}

function statusBadge(s) {
  if (s === 'in-progress') return 'badge-progress';
  if (s === 'resolved') return 'badge-resolved';
  return 'badge-open';
}

function priorityBadge(p) {
  if (p === 'high') return 'badge-high';
  if (p === 'medium') return 'badge-medium';
  return 'badge-low';
}

function updateStatus(id, status) {
  fetch(`http://localhost:5000/tickets/${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  }).then(r => r.json()).then(() => loadTickets());
}

function deleteTicket(id) {
  if (!confirm('Delete this ticket?')) return;
  fetch(`http://localhost:5000/tickets/${id}`, { method: 'DELETE' })
    .then(r => r.json()).then(() => loadTickets());
}
</script>
</body>
</html>
